<!DOCTYPE html>
<html>
<head>
    <title>TU Navbar</title>

    <style>
        p {
            margin: 0;
            font-family:Arial, Helvetica, sans-serif;
        }

        
        .navbar {
            display: flex;
            align-items: center;
            background-color: #800064;
            padding: 10px 20px;
        }

        
        .navbar img {
            height: 50px;
            margin-right: 20px;
        }

        
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        
        
    </style>
</head>

<body>

    <div class="navbar">
        <!-- Logo -->
        <img src="TUlogo.png" href="University Logo">

        
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

</body>
</html>
